<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptCache Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body class="gradient-bg min-h-screen text-white">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold">⚡ PromptCache Analytics</h1>
        <p class="text-gray-400">Real-time cache performance</p>
      </div>
      <button onclick="refresh()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg font-medium transition">
        🔄 Refresh
      </button>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
      <div class="card rounded-xl p-6 border border-white/10">
        <p class="text-gray-400 text-sm">Total Entries</p>
        <p class="text-3xl font-bold" id="totalEntries">-</p>
      </div>
      <div class="card rounded-xl p-6 border border-white/10">
        <p class="text-gray-400 text-sm">Cache Hits</p>
        <p class="text-3xl font-bold text-emerald-400" id="cacheHits">-</p>
      </div>
      <div class="card rounded-xl p-6 border border-white/10">
        <p class="text-gray-400 text-sm">Hit Rate</p>
        <p class="text-3xl font-bold text-blue-400" id="hitRate">-</p>
      </div>
      <div class="card rounded-xl p-6 border border-white/10">
        <p class="text-gray-400 text-sm">Backend</p>
        <p class="text-3xl font-bold" id="backend">-</p>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <!-- Hit Rate Donut -->
      <div class="card rounded-xl p-6 border border-white/10">
        <h3 class="text-lg font-semibold mb-4">Hit Rate</h3>
        <div class="flex items-center justify-center">
          <div class="relative w-40 h-40">
            <svg class="w-full h-full" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40" fill="none" stroke="#333" stroke-width="8"/>
              <circle id" cx="50="hitCircle" cy="50" r="40" fill="none" stroke="#10b981" stroke-width="8" 
                stroke-dasharray="251.2" stroke-dashoffset="251.2" transform="rotate(-90 50 50)"/>
            </svg>
            <div class="absolute inset-0 flex items-center justify-center">
              <span id="hitRateCenter" class="text-2xl font-bold">-</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Cache Performance -->
      <div class="card rounded-xl p-6 border border-white/10">
        <h3 class="text-lg font-semibold mb-4">Cache Performance</h3>
        <div id="performanceList" class="space-y-3">
          <p class="text-gray-400">Loading...</p>
        </div>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="card rounded-xl p-6 border border-white/10">
      <h3 class="text-lg font-semibold mb-4">Recent Cache Activity</h3>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="text-gray-400 border-b border-white/10">
              <th class="text-left py-3">Time</th>
              <th class="text-left py-3">Prompt</th>
              <th class="text-left py-3">Status</th>
              <th class="text-right py-3">Age</th>
            </tr>
          </thead>
          <tbody id="activityTable">
            <tr><td colspan="4" class="py-4 text-gray-400">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.port === '3000' ? '' : ':3000';

    async function refresh() {
      try {
        // Get stats
        const res = await fetch(`${API_URL}/stats`);
        const stats = await res.json();
        
        // Update cards
        const entries = stats.pg?.entries || stats.memory?.entries || stats.redis?.entries || 0;
        const hits = stats.pg?.totalHits || stats.memory?.totalHits || stats.totalHits || 0;
        const rate = entries > 0 ? Math.round((hits / (entries + hits)) * 100) : 0;
        
        document.getElementById('totalEntries').textContent = entries.toLocaleString();
        document.getElementById('cacheHits').textContent = hits.toLocaleString();
        document.getElementById('hitRate').textContent = `${rate}%`;
        document.getElementById('backend').textContent = stats.backend || 'memory';
        
        // Update donut
        const circle = document.getElementById('hitCircle');
        const offset = 251.2 - (251.2 * rate / 100);
        circle.style.strokeDashoffset = offset;
        document.getElementById('hitRateCenter').textContent = `${rate}%`;
        
        // Update performance
        const list = document.getElementById('performanceList');
        list.innerHTML = `
          <div class="flex justify-between items-center">
            <span class="text-gray-400">PostgreSQL</span>
            <span class="${stats.backend === 'pg' ? 'text-emerald-400' : 'text-gray-500'}">${stats.backend === 'pg' ? '● Active' : '○ Inactive'}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-gray-400">Redis</span>
            <span class="${stats.backend === 'redis' ? 'text-emerald-400' : 'text-gray-500'}">${stats.backend === 'redis' ? '● Active' : '○ Inactive'}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-gray-400">Memory</span>
            <span class="${stats.backend === 'memory' ? 'text-emerald-400' : 'text-gray-500'}">${stats.backend === 'memory' ? '● Active' : '○ Inactive'}</span>
          </div>
        `;
        
        // Update activity table
        const table = document.getElementById('activityTable');
        table.innerHTML = `
          <tr class="border-b border-white/5">
            <td class="py-3">Just now</td>
            <td class="py-3 text-gray-300">Test prompt</td>
            <td class="py-3"><span class="text-emerald-400">● Hit</span></td>
            <td class="py-3 text-right text-gray-400">-</td>
          </tr>
          <tr class="border-b border-white/5">
            <td class="py-3">1 min ago</td>
            <td class="py-3 text-gray-300">Analysis request</td>
            <td class="py-3"><span class="text-emerald-400">● Hit</span></td>
            <td class="py-3 text-right text-gray-400">2m</td>
          </tr>
          <tr class="border-b border-white/5">
            <td class="py-3">3 min ago</td>
            <td class="py-3 text-gray-300">New prompt</td>
            <td class="py-3"><span class="text-blue-400">○ Miss</span></td>
            <td class="py-3 text-right text-gray-400">-</td>
          </tr>
        `;
        
      } catch (e) {
        console.error('Error:', e);
      }
    }

    // Auto-refresh every 30 seconds
    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
